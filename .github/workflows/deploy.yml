name: Deploy site

# Positive path filter: list what *does* trigger a rebuild instead of
# accepting everything and negatively excluding docs/CI. The previous
# filter used `**.md`, `**.yml`, `**.js` etc. + a growing `!...`
# block-list, which meant every new top-level dev file (migration
# notes, eslint config, etc.) had to be added to the deny list or it
# would spuriously trigger deploys. GitHub Actions doesn't support
# YAML anchors here, so the two blocks below intentionally mirror
# each other verbatim.
on:
  push:
    branches:
      - master
      - main
    paths:
      # Content collections & pages
      - "_posts/**"
      - "_news/**"
      - "_projects/**"
      - "_bibliography/**"
      - "_data/**"
      - "_pages/**"
      # Templates, partials, styles, plugins
      - "_layouts/**"
      - "_includes/**"
      - "_sass/**"
      - "_plugins/**"
      # Static assets (images, fonts, JS, CSS, PDFs)
      - "assets/**"
      # Post-build scripts (inline-critical-css etc.)
      - "bin/**"
      # Top-level public files Jekyll copies through
      - "robots.txt"
      - "*.html"
      # Build configuration — any change here can alter the output
      - "_config.yml"
      - "Gemfile"
      - "Gemfile.lock"
      - "requirements.txt"
      - "package.json"
      - "package-lock.json"
      # The deploy workflow itself
      - ".github/workflows/deploy.yml"
  pull_request:
    branches:
      - master
      - main
    paths:
      - "_posts/**"
      - "_news/**"
      - "_projects/**"
      - "_bibliography/**"
      - "_data/**"
      - "_pages/**"
      - "_layouts/**"
      - "_includes/**"
      - "_sass/**"
      - "_plugins/**"
      - "assets/**"
      - "robots.txt"
      - "*.html"
      - "_config.yml"
      - "Gemfile"
      - "Gemfile.lock"
      - "requirements.txt"
      - "package.json"
      - "package-lock.json"
      - ".github/workflows/deploy.yml"
  workflow_dispatch:

permissions:
  contents: write

# Only one deploy at a time per ref. Do NOT cancel in progress — we
# never want to abort a half-finished deploy mid-push to gh-pages;
# queue the next one instead.
concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: false

jobs:
  deploy:
    # available images: https://github.com/actions/runner-images#available-images
    runs-on: ubuntu-latest
    steps:
      - name: Checkout 🛎️
        uses: actions/checkout@v4
      - name: Setup Ruby 💎
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.3.5"
          bundler-cache: true
      - name: Setup Python 🐍
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: "pip" # caching pip dependencies
      - name: Install and Build 🔧
        # `pip install -r requirements.txt` uses the pinned constraints
        # in the repo so the build isn't at the mercy of whatever
        # `--upgrade nbconvert` resolves to today. The actions/setup-python
        # cache above keys on this file's hash.
        run: |
          pip install -r requirements.txt
          export JEKYLL_ENV=production
          bundle exec jekyll build
      - name: Setup Node.js 🟢
        uses: actions/setup-node@v4
        with:
          # Matches engines.node floor in package.json; mirrors eslint.yml.
          node-version: "20"
          cache: "npm"
      - name: Install npm deps 📦
        # `npm ci` is reproducible (respects package-lock) and faster than
        # `npm install`. Gives us the pinned purgecss version instead of
        # pulling whatever `npm install -g purgecss` resolves at build time.
        run: npm ci
      - name: Purge + inline critical CSS per HTML page 🧬
        # Replaces the prior two-step (purgecss → inline) flow with
        # one pass that purges each HTML file against only its own
        # markup + all JS, then inlines the tailored CSS. Gives
        # per-page coverage instead of a shared union blob — shaves
        # another ~5-9 KiB off each HTML response (Lighthouse's
        # "Reduce unused CSS" audit was flagging ~10 KiB of
        # cross-page Bootstrap rules that no single page actually
        # used).
        run: node bin/inline-critical-css.mjs
      - name: Deploy 🚀
        if: github.event_name != 'pull_request'
        # Pinned to v4.8.0's commit SHA (not the floating v4 major tag)
        # so a compromised or accidentally-broken release on upstream's
        # side can't silently push to our gh-pages branch. Bump by
        # resolving a newer tag → SHA and updating both lines together.
        uses: JamesIves/github-pages-deploy-action@d92aa235d04922e8f08b40ce78cc5442fcfbfa2f # v4.8.0
        with:
          folder: _site
